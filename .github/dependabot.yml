version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # ignore updates to gh-aw-actions, which only appears in auto-generated *.lock.yml
      # files managed by 'gh aw compile' and should not be touched by dependabot
      - dependency-name: "github/gh-aw-actions"

  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: daily
      time: "10:00"
    open-pull-requests-limit: 25
    ignore:
      - dependency-name: "Microsoft.Build"
      - dependency-name: "Microsoft.Build.Framework"
      - dependency-name: "Microsoft.Build.Utilities.Core"
      - dependency-name: "Microsoft.Build.Tasks.Core"

  - package-ecosystem: nuget
    target-branch: nightly
    directory: "/"
    schedule:
      interval: daily
      time: "10:00"
    open-pull-requests-limit: 5
    allow:
      - dependency-name: "FSharp.Compiler.Service"
