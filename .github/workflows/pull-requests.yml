name: Build and Test PR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
    - main

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
    - name: Run CI
      run: dotnet fsi build.fsx
  
